@import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap");
* { font-family: "Tajawal", sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --sajil-dark: #0A3A36; --sajil-teal: #00E5CC; --sajil-teal-dark: #00C4B0;
    --sajil-white: #FFFFFF; --sajil-light: #F0F7F6; --sajil-gray: #8A9B99;
    --sajil-gold: #C9A227; --sajil-red: #E53935;
}
body { background: var(--sajil-dark); min-height: 100vh; }
.top-bar {
    background: var(--sajil-dark); border-bottom: 1px solid rgba(0,229,204,0.15);
    padding: 12px 30px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
}
.lang-btn, .theme-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--sajil-white);
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.lang-btn:hover, .theme-btn:hover { background: var(--sajil-teal); color: var(--sajil-dark); }
.main-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
.card {
    background: var(--sajil-white); border-radius: 24px; padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; min-height: 85vh;
}
.title { color: var(--sajil-dark); font-size: 38px; font-weight: 900; text-align: center; margin-bottom: 6px; }
.subtitle { color: var(--sajil-gray); font-size: 17px; text-align: center; margin-bottom: 35px; }
.section {
    background: var(--sajil-light); border-radius: 20px; padding: 28px; margin-bottom: 18px;
    border-top: 4px solid var(--sajil-teal);
}
.section h3 { color: var(--sajil-dark); font-size: 20px; font-weight: 800; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid rgba(0,229,204,0.2); }
input, select {
    width: 100%; height: 52px; font-size: 18px; padding: 12px 16px;
    border: 2px solid #E0E8E6; border-radius: 12px; background: white;
    color: var(--sajil-dark); margin-bottom: 12px;
}
input:focus, select:focus { border-color: var(--sajil-teal); outline: none; box-shadow: 0 0 0 4px rgba(0,229,204,0.12); }
input:disabled, select:disabled { background: #E8EEED; color: var(--sajil-gray); cursor: not-allowed; }
.price-box {
    background: linear-gradient(135deg, #E8F5F2, #D1EAE5); border: 2px solid var(--sajil-teal);
    border-radius: 14px; padding: 16px 20px; margin: 12px 0;
    display: flex; justify-content: space-between; align-items: center;
}
.price-box .label { color: var(--sajil-gray); font-size: 17px; font-weight: 600; }
.price-box .value { color: var(--sajil-teal-dark); font-size: 26px; font-weight: 900; }
.btn-calc {
    background: linear-gradient(135deg, var(--sajil-teal), var(--sajil-teal-dark));
    color: var(--sajil-dark); border: none; border-radius: 16px; padding: 22px;
    font-size: 24px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 18px;
}
.results {
    background: linear-gradient(145deg, #E8F5F2, #D1EAE5); border: 2px solid var(--sajil-teal);
    border-radius: 20px; padding: 28px; margin-top: 18px;
}
.result-row {
    display: flex; justify-content: space-between; padding: 12px 0;
    border-bottom: 2px dashed rgba(0,229,204,0.15); font-size: 20px; color: var(--sajil-dark); font-weight: 500;
}
.result-row:last-child {
    border-bottom: none; font-size: 32px; font-weight: 900; color: var(--sajil-teal-dark);
    margin-top: 16px; padding-top: 16px; border-top: 3px solid var(--sajil-teal);
}
.login-box {
    background: var(--sajil-white); border-radius: 24px; padding: 50px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 480px; margin: 0 auto; text-align: center;
}
.error {
    background: linear-gradient(135deg, #FFEBEE, #FFCDD2); color: var(--sajil-red);
    padding: 14px; border-radius: 12px; margin-top: 16px; font-size: 17px; font-weight: 600;
    border: 2px solid #FFCDD2; text-align: center;
}
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 2px solid #E8EEED; flex-wrap: wrap; gap: 12px; }
.header h1 { color: var(--sajil-dark); font-size: 32px; font-weight: 900; }
.header p { color: var(--sajil-gray); font-size: 15px; }
.header-btns { display: flex; gap: 10px; flex-wrap: wrap; }
.header-btn {
    padding: 12px 20px; font-size: 15px; font-weight: 700; border-radius: 10px;
    border: none; cursor: pointer;
}
.btn-info { background: linear-gradient(135deg, var(--sajil-teal), var(--sajil-teal-dark)); color: var(--sajil-dark); }
.btn-warn { background: linear-gradient(135deg, var(--sajil-gold), #B8941F); color: white; }
.btn-danger { background: linear-gradient(135deg, var(--sajil-red), #C62828); color: white; }
.btn-admin { background: linear-gradient(135deg, var(--sajil-dark), #072724); color: white; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.admin-panel {
    background: var(--sajil-light); border: 2px solid var(--sajil-teal);
    border-radius: 20px; padding: 28px; margin-bottom: 18px;
}
.admin-panel h3 { color: var(--sajil-dark); font-size: 22px; font-weight: 900; margin-bottom: 18px; text-align: center; }
.lock-control {
    background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px;
    border: 2px solid #E8EEED; display: flex; justify-content: space-between; align-items: center;
}
.lock-control label { font-size: 17px; font-weight: 700; color: var(--sajil-dark); }
.lock-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.lock-toggle input[type="checkbox"] {
    width: 48px; height: 26px; appearance: none; background: #E0E8E6;
    border-radius: 26px; position: relative; cursor: pointer; transition: all 0.3s; margin: 0;
}
.lock-toggle input[type="checkbox"]:checked { background: var(--sajil-teal); }
.lock-toggle input[type="checkbox"]::after {
    content: ""; position: absolute; width: 20px; height: 20px; background: white;
    border-radius: 50%; top: 3px; right: 3px; transition: all 0.3s;
}
.lock-toggle input[type="checkbox"]:checked::after { right: 25px; }
.lock-status { font-size: 13px; font-weight: 600; color: var(--sajil-gray); }
.manager-box {
    background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 2px solid #E8EEED;
}
.manager-box h4 { color: var(--sajil-dark); font-size: 18px; font-weight: 800; margin-bottom: 12px; }
.item-row {
    display: flex; justify-content: space-between; align-items: center; padding: 10px;
    background: var(--sajil-light); border-radius: 10px; margin-bottom: 6px; border: 1px solid #E0E8E6;
}
.item-row span { font-size: 15px; font-weight: 600; color: var(--sajil-dark); }
.item-row .item-value { color: var(--sajil-teal-dark); font-weight: 800; }
.item-row button {
    background: var(--sajil-red); color: white; border: none; border-radius: 8px;
    padding: 5px 10px; font-size: 13px; cursor: pointer;
}
.add-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 8px; align-items: center; }
.add-row input { margin-bottom: 0; height: 44px; }
.add-row button {
    background: linear-gradient(135deg, var(--sajil-teal), var(--sajil-teal-dark));
    color: var(--sajil-dark); border: none; border-radius: 10px; padding: 10px 16px;
    font-size: 15px; font-weight: 700; cursor: pointer;
}
.save-status {
    background: linear-gradient(135deg, #E8F5F2, #D1EAE5); color: var(--sajil-teal-dark);
    padding: 10px 18px; border-radius: 10px; margin-bottom: 12px; font-size: 15px;
    font-weight: 700; text-align: center; border: 2px solid var(--sajil-teal); display: none;
}
.save-status.show { display: block; }
.history-item {
    background: var(--sajil-light); border-radius: 14px; padding: 18px;
    margin-bottom: 12px; border: 2px solid rgba(0,229,204,0.1);

.history-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
.history-date { color: var(--sajil-gray); font-size: 13px; }
.history-total { color: var(--sajil-teal-dark); font-weight: 900; font-size: 20px; }
.history-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; font-size: 13px; color: var(--sajil-gray); }
.firebase-status {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 700;
    z-index: 999; transition: all 0.3s; display: none;
}
.firebase-status.show { display: block; }
.firebase-status.connected { background: #E8F5F2; color: var(--sajil-teal-dark); border: 2px solid var(--sajil-teal); }
.firebase-status.disconnected { background: #FFEBEE; color: var(--sajil-red); border: 2px solid #FFCDD2; }
.firebase-status.syncing { background: #FFF8E1; color: var(--sajil-gold); border: 2px dashed var(--sajil-gold); }
.firebase-status.offline { background: #E3F2FD; color: #1976D2; border: 2px solid #1976D2; }
.dark-mode .card, .dark-mode .login-box { background: #1a2a28; }
.dark-mode .section, .dark-mode .admin-panel { background: #243534; }
.dark-mode input, .dark-mode select { background: #1e2e2d; color: #e0e8e6; border-color: #2a3a38; }
.dark-mode .manager-box { background: #1e2e2d; border-color: #2a3a38; }
.dark-mode .item-row { background: #243534; border-color: #2a3a38; }
.dark-mode .history-item { background: #243534; }
.dark-mode .price-box { background: linear-gradient(135deg, #1a3a36, #0f2a28); }
.dark-mode .results { background: linear-gradient(145deg, #1a3a36, #0f2a28); }
.dark-mode .title, .dark-mode .header h1, .dark-mode .section h3, .dark-mode .lock-control label, .dark-mode .manager-box h4 { color: #e0e8e6; }
.dark-mode .subtitle, .dark-mode .header p { color: #8a9b99; }
.dark-mode .result-row { color: #e0e8e6; }
@media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .title { font-size: 26px; }
    .header h1 { font-size: 22px; }
    .card { padding: 20px; }
    .add-row { grid-template-columns: 1fr; }
}

function t(k) { return T[currentLang][k] || k; }

function showFirebaseStatus(status) {
    const el = document.getElementById("firebaseStatus");
    if (!el) return;
    el.className = "firebase-status show " + status;
    if (status === "connected") el.textContent = t("firebaseConnected");
    else if (status === "disconnected") el.textContent = t("firebaseDisconnected");
    else if (status === "syncing") el.textContent = t("firebaseSyncing");
    else if (status === "offline") el.textContent = t("firebaseOffline");
    if (status === "connected") setTimeout(() => el.classList.remove("show"), 2000);
}

function getCleanState() {
    return {
        carPriceLocked: !!adminState.carPriceLocked,
        manualPriceLocked: !!adminState.manualPriceLocked,
        insurancePriceLocked: !!adminState.insurancePriceLocked,
        taxRateLocked: !!adminState.taxRateLocked,
        offerRateLocked: !!adminState.offerRateLocked,
        cars: adminState.cars.map(c => ({name: String(c.name), price: Number(c.price) || 0})),
        customOffers: adminState.customOffers.map(o => ({name: String(o.name), discount: Number(o.discount) || 0})),
        customMemberships: adminState.customMemberships.map(m => ({name: String(m.name), discount: Number(m.discount) || 0})),
        users: adminState.users.map(u => ({username: String(u.username), password: String(u.password), role: String(u.role)})),
        lastUpdated: Date.now()
    };
}

async function loadSettings() {
    showFirebaseStatus("syncing");

    // First try to load from localStorage immediately
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const local = JSON.parse(saved);
            if (local.users && Array.isArray(local.users)) {
                adminState.users = local.users;
            }
            if (local.cars && Array.isArray(local.cars)) adminState.cars = local.cars;
            if (local.customOffers && Array.isArray(local.customOffers)) adminState.customOffers = local.customOffers;
            if (local.customMemberships && Array.isArray(local.customMemberships)) adminState.customMemberships = local.customMemberships;
            adminState.carPriceLocked = !!local.carPriceLocked;
            adminState.manualPriceLocked = !!local.manualPriceLocked;
            adminState.insurancePriceLocked = !!local.insurancePriceLocked;
            adminState.taxRateLocked = !!local.taxRateLocked;
            adminState.offerRateLocked = !!local.offerRateLocked;
            adminState.lastUpdated = local.lastUpdated || 0;
            console.log("Loaded from localStorage:", adminState.users.length, "users");
        } catch (e) {
            console.error("LocalStorage parse error:", e);
        }
    }

    // Then try Firebase
    try {
        const snap = await get(settingsRef);
        if (snap.exists()) {
            const data = snap.val();
            console.log("Firebase data loaded:", data);

            const serverTime = data.lastUpdated || 0;
            const localTime = adminState.lastUpdated || 0;

            // Only use Firebase data if it is newer
            if (serverTime >= localTime) {
                if (data.users && Array.isArray(data.users)) adminState.users = data.users;
                if (data.cars && Array.isArray(data.cars)) adminState.cars = data.cars;
                if (data.customOffers && Array.isArray(data.customOffers)) adminState.customOffers = data.customOffers;
                if (data.customMemberships && Array.isArray(data.customMemberships)) adminState.customMemberships = data.customMemberships;

                adminState.carPriceLocked = !!data.carPriceLocked;
                adminState.manualPriceLocked = !!data.manualPriceLocked;
                adminState.insurancePriceLocked = !!data.insurancePriceLocked;
                adminState.taxRateLocked = !!data.taxRateLocked;
                adminState.offerRateLocked = !!data.offerRateLocked;
                adminState.lastUpdated = serverTime;
            }

            firebaseConnected = true;
            showFirebaseStatus("connected");
        } else {
            console.log("No Firebase data, creating initial...");
            await saveSettings(true);
            firebaseConnected = true;
        }
    } catch (e) {
        console.error("Firebase load error:", e);
        firebaseConnected = false;
        showFirebaseStatus("disconnected");

        // If no localStorage data either, use defaults
        if (!saved) {
            console.log("Using default settings");
        }
    }

    settingsLoaded = true;
    console.log("Settings loaded. Users:", adminState.users.length, "Firebase connected:", firebaseConnected);
}

async function saveSettings(silent = false) {
    if (isSaving) return;
    isSaving = true;

    if (!silent) showFirebaseStatus("syncing");

    const cleanData = getCleanState();

    // Always save to localStorage first
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cleanData));
        console.log("Saved to localStorage");
    } catch (e) {
        console.error("LocalStorage save error:", e);
    }

    // Then try Firebase
    if (firebaseConnected) {
        try {
            await set(settingsRef, cleanData);
            console.log("Saved to Firebase successfully");
            adminState.lastUpdated = cleanData.lastUpdated;
            if (!silent) showFirebaseStatus("connected");
        } catch (e) {
            console.error("Firebase save error:", e);
            firebaseConnected = false;
            if (!silent) showFirebaseStatus("disconnected");
        }
    } else {
        console.log("Firebase not connected, saved to localStorage only");
        if (!silent) showFirebaseStatus("offline");
    }

    if (!silent) {
        const status = document.getElementById("saveStatus");
        if (status) {
            status.classList.add("show");
            setTimeout(() => status.classList.remove("show"), 2000);
        }
    }

    isSaving = false;
}

let unsubscribe = null;
function startRealtimeListener() {
    if (unsubscribe) unsubscribe();

    console.log("Starting realtime listener...");

    unsubscribe = onValue(
        settingsRef,
        (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                const serverTime = data.lastUpdated || 0;
                const localTime = adminState.lastUpdated || 0;

                console.log("Firebase update received. Server:", serverTime, "Local:", localTime);

                // Only update if server data is newer (allow 2 second buffer)
                if (serverTime > localTime + 2000) {
                    console.log("Updating from server...");

                    if (data.users && Array.isArray(data.users)) adminState.users = data.users;
                    if (data.cars && Array.isArray(data.cars)) adminState.cars = data.cars;
                    if (data.customOffers && Array.isArray(data.customOffers)) adminState.customOffers = data.customOffers;
                    if (data.customMemberships && Array.isArray(data.customMemberships)) adminState.customMemberships = data.customMemberships;

                    adminState.carPriceLocked = !!data.carPriceLocked;
                    adminState.manualPriceLocked = !!data.manualPriceLocked;
                    adminState.insurancePriceLocked = !!data.insurancePriceLocked;
                    adminState.taxRateLocked = !!data.taxRateLocked;
                    adminState.offerRateLocked = !!data.offerRateLocked;
                    adminState.lastUpdated = serverTime;

                    // Save to localStorage to keep in sync
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(getCleanState()));

                    if (isLoggedIn) renderApp();
                }

                firebaseConnected = true;
                showFirebaseStatus("connected");
            }
        },
        (error) => {
            console.error("Realtime listener error:", error.code, error.message);
            firebaseConnected = false;

            if (error.code === 'permission-denied') {
                console.error("Permission denied! Check Firestore Rules.");
                showFirebaseStatus("disconnected");
            } else {
                showFirebaseStatus("offline");
            }
        }
    );
}

function doCalculate() {
    const idx = parseInt(document.getElementById("carSelect").value);
    const car = adminState.cars[idx];

    if (idx === 0) {
        document.getElementById("results").innerHTML = `<div class="error" style="margin-top:18px;">${t("selectCarError")}</div>`;
        return;
    }

    let price = car.price;
    if (price === 0) {
        const manualPrice = parseFloat(document.getElementById("manualPrice").value) || 0;
        if (manualPrice <= 0) {
            document.getElementById("results").innerHTML = `<div class="error" style="margin-top:18px;">${t("enterManualError")}</div>`;
            return;
        }
        price = manualPrice;
    }

    const days = parseInt(document.getElementById("days").value) || 1;
    const membershipDiscount = parseFloat(document.getElementById("customerType").value) || 0;
    const offer = parseFloat(document.getElementById("offerSelect").value) || 0;
    const insPrice = parseFloat(document.getElementById("insurancePrice").value) || 0;
    const insOn = document.getElementById("insuranceCheck").checked;
    const tax = parseFloat(document.getElementById("taxRate").value) || 15;

    const carTotal = price * days;
    const membershipDisc = carTotal * membershipDiscount / 100;
    const afterMembership = carTotal - membershipDisc;
    let insTotal = 0;
    if (insOn && insPrice > 0) insTotal = insPrice * days;
    const beforeOffer = afterMembership + insTotal;
    const offerDisc = beforeOffer * offer / 100;
    const afterOffer = beforeOffer - offerDisc;
    const taxAmount = afterOffer * tax / 100;
    const total = afterOffer + taxAmount;

    const returnDate = new Date(Date.now() + days * 24 * 60 * 60 * 1000);
    const membershipName = adminState.customMemberships.find(m => m.discount == membershipDiscount)?.name || t("customer");

    history.unshift({
        date: new Date().toLocaleString(currentLang === "ar" ? "ar-SA" : "en-US"),
        car: car.name, price, days, total, customer: membershipName, insurance: insOn && insTotal > 0
    });
    if (history.length > 50) history.pop();

    const membershipHtml = membershipDisc > 0 ? 
        `<div class="result-row"><span>${t("membershipDiscount")} (${membershipName} - ${membershipDiscount}%):</span><span style="color:var(--sajil-teal-dark);font-weight:800;">-${membershipDisc.toFixed(2)} ${t("currency")}</span></div>` : "";

    const insuranceHtml = (insOn && insTotal > 0) ? 
        `<div class="result-row"><span>${t("insuranceLabel")}</span><span style="color:var(--sajil-teal-dark);font-weight:800;">+${insTotal.toFixed(2)} ${t("currency")}</span></div>` : "";

    const priceSource = (car.price === 0) ? ` <span style="font-size:13px;color:var(--sajil-gold);font-weight:600;">${t("manualPriceTag")}</span>` : "";

    document.getElementById("results").innerHTML = `
        <div class="results">
            <div class="result-row"><span>${t("carLabel")}</span><span>${car.name}${priceSource}</span></div>
            <div class="result-row"><span>${t("amount")}</span><span>${price} x ${days} = ${carTotal.toFixed(2)} ${t("currency")}</span></div>
            ${membershipHtml}
            ${insuranceHtml}
            <div class="result-row"><span>${t("totalBefore")}</span><span>${beforeOffer.toFixed(2)} ${t("currency")}</span></div>
            <div class="result-row"><span>${t("offerDiscount")}</span><span style="color:var(--sajil-teal-dark);font-weight:800;">-${offerDisc.toFixed(2)} ${t("currency")} (${offer}%)</span></div>
            <div class="result-row"><span>${t("afterDiscount")}</span><span>${afterOffer.toFixed(2)} ${t("currency")}</span></div>
            <div class="result-row"><span>${t("taxLabel")} (${tax}%):</span><span style="color:var(--sajil-teal-dark);font-weight:800;">+${taxAmount.toFixed(2)} ${t("currency")}</span></div>
            <div class="result-row"><span>${t("finalTotal")}</span><span>${total.toFixed(2)} ${t("currency")}</span></div>
            <div style="text-align:center;margin-top:12px;color:var(--sajil-gray);font-size:15px;font-weight:500;">
                ${t("returnDate")} <strong style="color:var(--sajil-teal-dark);">${returnDate.toLocaleDateString(currentLang === "ar" ? "ar-SA" : "en-US")}</strong>
            </div>
        </div>
    `;
}

function showHistory() {
    if (history.length === 0) {
        document.getElementById("results").innerHTML = `<div style="background:var(--sajil-light);color:var(--sajil-gray);padding:35px;border-radius:14px;text-align:center;font-size:18px;font-weight:600;">${t("noHistory")}</div>`;
        return;
    }

    const items = history.map(h => `
        <div class="history-item">
            <div class="history-header">
                <span class="history-date">${h.date}</span>
                <span class="history-total">${h.total.toFixed(2)} ${t("currency")}</span>
            </div>
            <div class="history-details">
                <span>${h.car}</span>
                <span>${h.price} ${t("perDay")}</span>
                <span>${h.days} ${t("daysLabel")}</span>
                <span>${h.customer}</span>
                ${h.insurance ? `<span>${t("withInsurance")}</span>` : ""}
            </div>
        </div>
    `).join("");

    document.getElementById("results").innerHTML = `
        <div style="background:white;border-radius:24px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);margin-top:18px;">
            <h2 style="color:var(--sajil-dark);font-size:26px;font-weight:900;margin-bottom:22px;text-align:center;">${t("historyTitle")}</h2>
            ${items}
        </div>
    `;
}

function exportData() {
    if (!requireAdmin()) return;
    const data = { history, exportDate: new Date().toISOString(), version: "3.0", adminState };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "sajil_backup_" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    URL.revokeObjectURL(url);
}

function doLogout() {
    history = [];
    isAdmin = false;
    isLoggedIn = false;
    adminPanelOpen = false;
    document.getElementById("logoutBtn").style.display = "none";
    renderLogin();
}

document.getElementById("themeBtn").addEventListener("click", toggleTheme);
document.getElementById("langBtn").addEventListener("click", () => setLanguage(currentLang === "ar" ? "en" : "ar"));
document.getElementById("logoutBtn").addEventListener("click", doLogout);

async function init() {
    document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
    document.documentElement.lang = currentLang;
    document.body.classList.toggle("dark-mode", isDarkMode);
    document.getElementById("themeBtn").innerHTML = isDarkMode ? t("lightMode") : t("darkMode");

    console.log("Starting Sajil with Firebase...");

    await loadSettings();
    startRealtimeListener();
    renderLogin();
}

init();
</script>
</body>
</html>
