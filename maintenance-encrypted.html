<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساجل - تحت الصيانة</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap");
* { font-family: "Tajawal", sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: linear-gradient(135deg, #0A3A36, #072724);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.card {
    background: #1a2a28;
    border-radius: 24px;
    padding: 60px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 2px solid rgba(0,229,204,0.15);
}
.icon { font-size: 80px; margin-bottom: 24px; }
.title {
    color: #ffffff;
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 16px;
}
.subtitle {
    color: #a0b5b3;
    font-size: 18px;
    margin-bottom: 40px;
    line-height: 1.6;
}
.admin-box {
    background: rgba(0,229,204,0.05);
    border: 2px dashed #00E5CC;
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
}
.admin-label {
    color: #a0b5b3;
    font-size: 14px;
    margin-bottom: 14px;
    display: block;
}
input {
    width: 100%;
    height: 52px;
    font-size: 18px;
    padding: 12px 16px;
    border: 2px solid #2a3a38;
    border-radius: 12px;
    background: #1e2e2d;
    color: #ffffff;
    margin-bottom: 12px;
    text-align: center;
}
input:focus {
    border-color: #00E5CC;
    outline: none;
    box-shadow: 0 0 0 4px rgba(0,229,204,0.12);
}
.btn {
    background: linear-gradient(135deg, #00E5CC, #00C4B0);
    color: #0A3A36;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,229,204,0.3);
}
.error {
    color: #ff6b6b;
    font-size: 15px;
    font-weight: 600;
    margin-top: 10px;
}
.success {
    color: #00E5CC;
    font-size: 15px;
    font-weight: 700;
    margin-top: 10px;
}
.footer {
    color: #5a6b69;
    font-size: 13px;
    margin-top: 30px;
}
.hidden { display: none; }
@media (max-width: 480px) {
    .card { padding: 40px 24px; }
    .title { font-size: 26px; }
    .icon { font-size: 60px; }
}
</style>
</head>
<body>
<div class="card">
    <div class="icon">🔧</div>
    <h1 class="title">الموقع تحت الصيانة</h1>
    <p class="subtitle">
        نعمل على تحسين الخدمة وتطويرها<br>
        سنعود قريباً بميزات جديدة
    </p>

    <div class="admin-box">
        <span class="admin-label">🔐 دخول الإدارة فقط</span>
        <input type="password" id="adminPass" placeholder="كلمة المرور" autocomplete="off">
        <button class="btn" id="loginBtn">دخول</button>
        <div id="msg"></div>
    </div>

    <p class="footer">ساجل - حاسبة التأجير</p>
</div>

<script>
// 🔐 SHA-256 HASH لكلمة المرور (sajil2024)
// لا يمكن فك التشفير - فقط مقارنة البصمة
const ADMIN_PASSWORD_HASH = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8";

// دالة تشفير SHA-256
async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// التحقق من كلمة المرور
async function verifyPassword(inputPassword) {
    const inputHash = await sha256(inputPassword);
    return inputHash === ADMIN_PASSWORD_HASH;
}

document.getElementById("loginBtn").addEventListener("click", async () => {
    const pass = document.getElementById("adminPass").value;
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    if (!pass) {
        msg.innerHTML = '<div class="error">أدخل كلمة المرور</div>';
        return;
    }

    btn.disabled = true;
    btn.textContent = "جاري التحقق...";

    try {
        const isValid = await verifyPassword(pass);

        if (isValid) {
            msg.innerHTML = '<div class="success">✓ تم التحقق، جاري الدخول...</div>';
            setTimeout(() => {
                document.querySelector(".icon").textContent = "✅";
                document.querySelector(".title").textContent = "تم الدخول بنجاح";
                document.querySelector(".subtitle").innerHTML = "يمكنك الآن استخدام الموقع";
                document.querySelector(".admin-box").classList.add("hidden");
            }, 1000);
        } else {
            msg.innerHTML = '<div class="error">✗ كلمة المرور غير صحيحة</div>';
            document.getElementById("adminPass").value = "";
            btn.disabled = false;
            btn.textContent = "دخول";
        }
    } catch (e) {
        msg.innerHTML = '<div class="error">خطأ في التحقق</div>';
        btn.disabled = false;
        btn.textContent = "دخول";
    }
});

document.getElementById("adminPass").addEventListener("keypress", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
});
</script>
</body>
</html>
